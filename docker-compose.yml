# Docker Compose for local development: Postgres + pgAdmin
# Supports a `.env` file with the following optional variables (defaults are shown):
# POSTGRES_DB=spring_oauth2_server_ui
# POSTGRES_USER=postgres
# POSTGRES_PASSWORD=admin
# PGADMIN_DEFAULT_EMAIL=admin@example.com
# PGADMIN_DEFAULT_PASSWORD=admin

version: '3.8'

services:
  db:
    image: postgres:15
    container_name: soauth2_db
    restart: unless-stopped
    environment:
      # Use compose interpolation with defaults so a .env file can override values
      POSTGRES_DB: ${POSTGRES_DB:-spring_oauth2_server_ui}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      # Use $$ to allow the container to see the environment variables (escaped for compose)
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:7
    container_name: soauth2_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80" # access pgAdmin at http://localhost:5050
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  db-data:
  pgadmin-data:

networks:
  default:
    name: soauth2-network


